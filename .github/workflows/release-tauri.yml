name: 🖥️ Tauri Desktop Release

on:
  push:
    tags:
      - 'tauri-[0-9]+.[0-9]+.[0-9]+'  # Tags como tauri-1.0.2

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            artifact_ext: '_x64-setup.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🍪 Create dummy cookies.txt
        run: echo "" > cookies.txt

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: ⚡ Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 📋 Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#tauri-}" >> $GITHUB_OUTPUT

      - name: 🏗️ Tauri Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles msi,nsis ${{ matrix.args }}

      - name: 📝 Update updater.json signature
        shell: pwsh
        run: |
          $signature = Get-Content (Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig | Select-Object -First 1)
          $updater = Get-Content updater.json | ConvertFrom-Json
          $updater.platforms.'windows-x86_64'.signature = $signature
          $updater.pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $updater | ConvertTo-Json -Depth 10 | Set-Content updater.json

      - name: 🚀 Commit updated updater.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updater.json
          git commit -m "chore: update signature in updater.json [skip ci]" || echo "No changes to commit"
          git pull origin main --rebase
          git push origin HEAD:main

      - name: 🚀 Create GitHub Release and upload Exes
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: "ChrisMusic Desktop ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🖥️ Actualización de Escritorio (Windows)
            Esta es la ruta de actualización para Windows.
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
