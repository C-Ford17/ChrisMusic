name: 🖥️ Tauri Desktop Release

on:
  push:
    tags:
      - 'tauri-[0-9]+.[0-9]+.[0-9]+'  # Tags como tauri-1.0.2

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            artifact_ext: '_x64-setup.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🍪 Create dummy cookies.txt
        run: echo "" > cookies.txt

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 📋 Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#tauri-}" >> $GITHUB_OUTPUT

      - name: 🔐 Generate Key File
        shell: bash
        env:
          KEY_BASE64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY_BASE64" ]; then
            echo "❌ ERROR FATAL: El secreto TAURI_SIGNING_PRIVATE_KEY está vacío."
            exit 1
          fi
          echo "$KEY_BASE64" | base64 --decode > tauri_private.key
          echo "✅ Llave privada decodificada a tauri_private.key"

      - name: 🏗️ Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: tauri_private.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ChrisMusic Desktop ${{ steps.version.outputs.VERSION }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
